<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BlackRoot</title>

  <!-- PREVIEW OFICIAL DO LINK - WhatsApp / Facebook / redes sociais -->
  <meta name="description" content="Clik para Experiência!" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://betao-blackroot.github.io/Flyer_BlackRoot/" />
  <meta property="og:title" content="BlackRoot" />
  <meta property="og:description" content="Clik para Experiência!" />
  <meta property="og:image" content="https://betao-blackroot.github.io/Flyer_BlackRoot/assets/preview-blackroot-og.jpg" />
  <meta property="og:image:secure_url" content="https://betao-blackroot.github.io/Flyer_BlackRoot/assets/preview-blackroot-og.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="BlackRoot - Clik para Experiência!" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BlackRoot" />
  <meta name="twitter:description" content="Clik para Experiência!" />
  <meta name="twitter:image" content="https://betao-blackroot.github.io/Flyer_BlackRoot/assets/preview-blackroot-og.jpg" />

  <meta name="theme-color" content="#050505" />
  <link rel="stylesheet" href="css/android.css?v=1.3.3-app-badges-final" />
</head>
<body class="android-page">
  <main class="android-main" aria-label="Landing Experiência Black versão Android">
    <section class="android-stage" id="flyerFrame">

      <section class="android-hero-card" aria-label="Experiência Black">
        <img class="android-hero-img" src="assets/mobile-hero.jpg" alt="Flyer oficial Experiência Black" draggable="false" />
        <div class="android-hero-shade" aria-hidden="true"></div>
        <canvas id="blackrootSpectrum" class="android-spectrum" aria-hidden="true"></canvas>

        <div class="android-inner-title" aria-hidden="true">
          <span>★</span><strong>EXPERIÊNCIA BLACK</strong><span>★</span>
        </div>

        <div class="ao-vivo-stamp is-paused" id="aoVivoStamp" aria-label="Status da transmissão: pausado">
          <span class="ao-vivo-dot"></span>
          <strong id="aoVivoText">PAUSADO</strong>
        </div>
      </section>

      <section class="countdown-box android-countdown-card" id="countdownBox" aria-label="Contagem regressiva para a estreia">
        <span class="countdown-kicker">FALTAM</span>
        <div class="countdown-grid">
          <div class="countdown-item"><strong id="countDays">00</strong><small>DIAS</small></div>
          <div class="countdown-item"><strong id="countHours">00</strong><small>HORAS</small></div>
          <div class="countdown-item"><strong id="countMinutes">00</strong><small>MIN</small></div>
          <div class="countdown-item"><strong id="countSeconds">00</strong><small>SEG</small></div>
        </div>
        <div class="countdown-date">12/07 <span>12HS</span></div>
      </section>

      <nav class="flyer-choice-menu android-choice-menu open" id="flyerChoiceMenu" aria-label="Controles de áudio">
        <button class="flyer-choice-btn" id="choiceRadioBtn" type="button">Rádio</button>
        <button class="flyer-choice-btn" id="choiceIntroBtn" type="button">Chamada</button>
        <button class="flyer-choice-btn is-pause" id="choicePauseBtn" type="button">Reprise</button>
      </nav>

      <section class="android-program-card" aria-label="Programação e volume">
        <div class="sunday-mini sunday-card-image android-sunday" aria-label="Todos os domingos a partir do meio-dia">
          <img src="assets/todos-os-domingos.png" alt="Todos os domingos a partir do meio-dia" draggable="false" />
        </div>
        <div class="flyer-volume-panel android-volume" aria-label="Controle de volume">
          <button class="flyer-volume-btn" id="flyerVolumeBtn" type="button" aria-label="Ativar ou desativar som">🔊</button>
          <input class="flyer-volume-range" id="flyerVolumeControl" type="range" min="0" max="1" step="0.01" value="0.9" aria-label="Volume" />
        </div>
      </section>

      <div class="android-genre-strip" aria-label="Gêneros musicais">
        CHARME - R&amp;B - SOUL - SAMBA ROCK - FLASH BACK - HIP HOP
      </div>

      <footer class="android-footer" aria-label="Links e redes sociais">
        <section class="android-app-block" aria-label="Aplicativos">
          <img class="text-ouca-app" src="assets/text-ouca-pelo-app.png" alt="Ouça Pelo App" draggable="false" />
          <div class="android-app-row">
            <button class="float-link float-radios logo-button" type="button" data-link="appRadios" aria-label="Abrir Radios.com">
              <img class="float-img img-radios" src="assets/radios-com-logo.png" alt="Radios.com" />
            </button>
            <div class="android-store-stack">
              <button class="float-link float-android image-badge" type="button" data-link="appAndroid" aria-label="Abrir Google Play">
                <img class="float-img badge-img" src="assets/google-play-badge.png" alt="Google Play" />
              </button>
              <button class="float-link float-apple image-badge" type="button" data-link="appApple" aria-label="Abrir App Store">
                <img class="float-img badge-img" src="assets/app-store-badge.png" alt="App Store" />
              </button>
            </div>
          </div>
        </section>

        <section class="android-brand-block" aria-label="Identidade da rádio">
          <div class="brand-footer-text" aria-label="www.radioblackinlove.com - A Casa da Black Music">
            <span class="brand-footer-site">www.radioblackinlove.com</span>
            <span class="brand-footer-slogan">A Casa da Black Music</span>
          </div>
          <button class="float-link float-site logo-button site-logo-button android-logo" type="button" data-link="site" aria-label="Abrir site Black in Love">
            <img class="float-img img-site" src="assets/black-in-love-logo.png" alt="Black In Love" />
          </button>
        </section>

        <section class="android-social-row" aria-label="Redes sociais">
          <button class="float-link float-facebook icon-only" type="button" data-link="facebook" aria-label="Abrir Facebook">
            <img class="float-img social-img" src="assets/facebook-official.png" alt="Facebook" />
          </button>
          <button class="float-link float-instagram icon-only" type="button" data-link="instagram" aria-label="Abrir Instagram">
            <img class="float-img social-img" src="assets/instagram-official.png" alt="Instagram" />
          </button>
          <button class="float-link float-whatsapp icon-only" type="button" data-link="whatsapp" aria-label="Abrir WhatsApp">
            <img class="float-img social-img" src="assets/whatsapp-official.png" alt="WhatsApp" />
          </button>
          <button class="float-link float-youtube icon-only" type="button" data-link="youtube" aria-label="Abrir YouTube">
            <img class="float-img social-img" src="assets/youtube-official.png" alt="YouTube" />
          </button>
        </section>
      </footer>

      <button class="hotspot hotspot-vinyl" id="vinylHotspot" type="button" aria-label="Abrir opções de áudio"><span class="vinyl-led"></span></button>
    </section>
  </main>

  <audio id="introAudio" src="assets/audio/chamada.mp3" preload="auto"></audio>
  <audio id="streamAudio" preload="none"></audio>
  <iframe id="repriseFrame" title="Reprise Experiência Black" src="about:blank" allow="autoplay; encrypted-media" style="position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;border:0;"></iframe>
  <script src="js/config.js?v=1.3.2"></script>
  <script src="js/app.js?v=1.3.2-footer-clean"></script>
</body>
</html>
