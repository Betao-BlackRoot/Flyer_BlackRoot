<!DOCTYPE html>
<!--
  PROJETO: Landing / Flyer Experiência Black
  ARQUIVO: index.html
  OBJETIVO DESTE ARQUIVO:
  - Montar a estrutura da página.
  - Carregar o flyer principal.
  - Colocar elementos por cima do flyer: selo AO VIVO, contador, vinil, botões, links e volume.
  - Carregar os áudios e o JavaScript.

  IMPORTANTE PARA EDITAR NO VS CODE:
  - HTML = estrutura, ou seja, o que existe na tela.
  - CSS = aparência, posição, tamanho, cor, brilho, responsivo.
  - JS = funcionamento, clique, áudio, status AO VIVO / VINHETA / PAUSADO / CONECTANDO.

  REGRA DE SEGURANÇA DO PROJETO:
  - Não mexa no nome das classes sem também ajustar o CSS e o JS.
  - Não mexa no caminho dos assets se não for trocar o arquivo dentro da pasta assets.
-->
<html lang="pt-BR">
<head>
  <!-- Define os caracteres para aceitar acentos e português corretamente. -->
  <meta charset="UTF-8" />

  <!-- Faz o site se ajustar ao tamanho da tela, principalmente celular. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título que aparece na aba do navegador. -->
  <title>Experiência Black | Betão BlackRoot</title>

  <!-- Descrição básica do site. Ajuda em compartilhamento e SEO. -->
  <meta name="description" content="Landing oficial do programa Experiência Black, apresentado por Betão BlackRoot." />

  <!-- Cor do topo em alguns navegadores mobile. -->
  <meta name="theme-color" content="#050505" />

  <!-- Carrega todo o visual da página. Para ajustar posição/tamanho, vá em css/style.css. -->
  <link rel="stylesheet" href="css/style.css?v=1.1.6-mobile-clean-fix" />
</head>

<body>

  <!-- Fundo visual da página. Ele fica atrás de tudo. aria-hidden evita leitura por leitor de tela. -->
  <div class="page-bg" aria-hidden="true"></div>

  
  <!-- Conteúdo principal: flyer centralizado. O player externo foi removido; o controle fica no próprio flyer. -->
  <main class="main-content">

    <!-- HERO = área principal do flyer. -->
    <section class="hero">
      <!-- Moldura externa do flyer. -->
      <div class="flyer-shell">
        <!-- Frame do flyer. Tudo que fica por cima da imagem base fica dentro desse bloco. -->
        <div class="flyer-frame" id="flyerFrame">
          <div class="flyer-stage">

          <!-- Imagem base oficial do flyer. Não mexer aqui se o flyer estiver aprovado. -->
          <img
            class="flyer-img"
            src="assets/flyer.jpg"
            alt="Flyer oficial Experiência Black"
            draggable="false"
          />

          <canvas id="blackrootSpectrum"></canvas>

          <!-- Texto interno no topo do flyer: EXPERIÊNCIA BLACK. A posição fica no CSS. -->
          <div class="flyer-inner-title" aria-hidden="true">
            <span>★</span>
            <strong>EXPERIÊNCIA BLACK</strong>
            <span>★</span>
          </div>

          <!-- Slogan dentro do flyer: A MÚSICA TOCANDO VOCÊ. A posição fica no CSS. -->
          <div class="music-slogan" aria-hidden="true">
            <span>A MÚSICA TOCANDO VOCÊ</span>
          </div>

          <!--
            MÓDULO DO VINIL
            vinyl-engine = imagem do disco recortado para simular movimento/brilho.
            O JS ativa o movimento quando adiciona a classe .vinyl-active no flyerFrame.
          -->
          <div class="vinyl-engine" aria-hidden="true">
            <img class="vinyl-engine-disc" src="assets/vinyl-disc-engine.png" alt="" draggable="false" />
          </div>

          <!-- Guarda/mascara estática do vinil para manter o encaixe visual no flyer. -->
          <img class="vinyl-static-guard" src="assets/vinyl-static-guard.png" alt="" aria-hidden="true" draggable="false" />

          <!--
            SELO DINÂMICO DO FLYER
            Este é o bloco que você pediu para controlar:
            - PAUSADO: quando nada toca ou quando pausa.
            - VINHETA: quando toca chamada.mp3.
            - CONECTANDO: quando a rádio está tentando iniciar.
            - AO VIVO: somente quando o navegador confirma que a rádio começou a tocar.
            - ERRO: se der falha no áudio.

            O texto muda pelo JS no arquivo js/app.js, função atualizarSeloAoVivo().
            O visual muda pelo CSS no arquivo css/style.css, classes .is-live, .is-vinheta, .is-paused, .is-connecting, .is-error.
          -->
          <div class="ao-vivo-stamp is-paused" id="aoVivoStamp" aria-label="Status da transmissão: pausado">
            <!-- Bolinha do selo. Ela pulsa quando está AO VIVO, VINHETA ou CONECTANDO. -->
            <span class="ao-vivo-dot"></span>

            <!-- Texto do selo. O JS troca este conteúdo. -->
            <strong id="aoVivoText">PAUSADO</strong>
          </div>

          <!--
            CONTADOR / RELÓGIO
            Mostra quanto falta para a estreia.
            A data vem do JS, objeto CONFIG_ESTREIA.
          -->
          <div class="countdown-box" id="countdownBox" aria-label="Contagem regressiva para a estreia">
            <span class="countdown-kicker">FALTAM</span>

            <div class="countdown-grid">
              <div class="countdown-item">
                <strong id="countDays">00</strong>
                <small>DIAS</small>
              </div>
              <div class="countdown-item">
                <strong id="countHours">00</strong>
                <small>HORAS</small>
              </div>
              <div class="countdown-item">
                <strong id="countMinutes">00</strong>
                <small>MIN</small>
              </div>
              <div class="countdown-item">
                <strong id="countSeconds">00</strong>
                <small>SEG</small>
              </div>
            </div>

            <!-- Texto fixo da data no contador. Se quiser trocar visualmente, mexa aqui e no JS. -->
            <div class="countdown-date">12/07 <span>12HS</span></div>
          </div>

          <!-- Caixa pequena Todos os Domingos. A imagem fica em assets/todos-os-domingos.png. -->
          <div class="sunday-mini sunday-card-image" aria-hidden="true">
            <img src="assets/todos-os-domingos.png" alt="" />
          </div>

          <!-- Controle de volume dentro do flyer. O JS sincroniza com o volume do player. -->
          <div class="flyer-volume-panel" aria-label="Controle de volume do flyer">
            <!-- Botão mutar/desmutar dentro do flyer. -->
            <button class="flyer-volume-btn" id="flyerVolumeBtn" type="button" aria-label="Ativar ou desativar som">🔊</button>

            <!-- Barra de volume dentro do flyer. min 0 = sem som, max 1 = volume máximo. -->
            <input
              class="flyer-volume-range"
              id="flyerVolumeControl"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="0.9"
              aria-label="Volume do flyer"
            />
          </div>

          <!--
            MENU PEQUENO DENTRO DO FLYER
            Abre quando clica no vinil.
            Rádio = toca stream ao vivo.
            Chamada = toca vinheta/chamada.mp3 e depois entra na rádio.
          -->
          <div class="flyer-choice-menu" id="flyerChoiceMenu">
            <button class="flyer-choice-btn" id="choiceRadioBtn" type="button">
              Rádio
            </button>

            <button class="flyer-choice-btn" id="choiceIntroBtn" type="button">
              Chamada
            </button>

            <!-- Reprise: toca/pausa o vídeo oficial no YouTube. -->
            <button class="flyer-choice-btn is-pause" id="choicePauseBtn" type="button">
              Reprise
            </button>
          </div>

          <!-- Imagem do texto "Ouça pelo app" no rodapé do flyer. -->
          <img class="flyer-text-img text-ouca-app" src="assets/text-ouca-pelo-app.png" alt="Ouça Pelo App" draggable="false" />

          <!-- Imagem antiga do site/casa. Mantida para compatibilidade, mas o texto real abaixo está em HTML. -->
          <img class="flyer-text-img text-site-casa" src="assets/text-site-casa.png" alt="www.radioblackinlove.com - A Casa da Black Music" draggable="false" />

          <!-- Texto oficial do rodapé em HTML, mais fácil de ajustar no CSS sem alterar imagem. -->
          <div class="brand-footer-text" aria-label="www.radioblackinlove.com - A Casa da Black Music">
            <span class="brand-footer-site">www.radioblackinlove.com</span>
            <span class="brand-footer-slogan">A Casa da Black Music</span>
          </div>

          <!--
            LINKS FLUTUANTES DO FLYER
            Cada botão usa data-link.
            O JS pega esse data-link e abre o endereço configurado no objeto LINKS.
            Para trocar URL, mexa no objeto LINKS no app.js.
          -->
          <button class="float-link float-radios logo-button" type="button" data-link="appRadios" aria-label="Abrir Radios.com">
            <img class="float-img img-radios" src="assets/radios-com-logo.png" alt="Radios.com" />
          </button>

          <button class="float-link float-android image-badge" type="button" data-link="appAndroid" aria-label="Abrir Google Play">
            <img class="float-img badge-img" src="assets/google-play-badge.png" alt="Google Play" />
          </button>

          <button class="float-link float-apple image-badge" type="button" data-link="appApple" aria-label="Abrir App Store">
            <img class="float-img badge-img" src="assets/app-store-badge.png" alt="App Store" />
          </button>

          <button class="float-link float-facebook icon-only" type="button" data-link="facebook" aria-label="Abrir Facebook">
            <img class="float-img social-img" src="assets/facebook-official.png" alt="Facebook" />
          </button>

          <button class="float-link float-instagram icon-only" type="button" data-link="instagram" aria-label="Abrir Instagram">
            <img class="float-img social-img" src="assets/instagram-official.png" alt="Instagram" />
          </button>

          <button class="float-link float-whatsapp icon-only" type="button" data-link="whatsapp" aria-label="Abrir WhatsApp">
            <img class="float-img social-img" src="assets/whatsapp-official.png" alt="WhatsApp" />
          </button>

          <button class="float-link float-youtube icon-only" type="button" data-link="youtube" aria-label="Abrir YouTube">
            <img class="float-img social-img" src="assets/youtube-official.png" alt="YouTube" />
          </button>

          <button class="float-link float-site logo-button site-logo-button" type="button" data-link="site" aria-label="Abrir site Black in Love">
            <img class="float-img img-site" src="assets/black-in-love-logo.png" alt="Black in Love" />
          </button>

          <!--
            ÁREA CLICÁVEL DO VINIL
            Este botão invisível fica em cima do vinil.
            Quando clica nele, abre o menu Rádio/Chamada.
            O span vinyl-led é o anel/efeito LED do vinil.
          -->
          <button class="hotspot hotspot-vinyl" id="vinylHotspot" type="button" aria-label="Abrir opções de áudio">
            <span class="vinyl-led"></span>
          </button>

          </div><!-- /.flyer-stage -->
        </div>
      </div>
    </section>

  </main>


  <!-- Áudio local da vinheta/chamada. O arquivo está em assets/audio/chamada.mp3. -->
  <audio id="introAudio" src="assets/audio/chamada.mp3" preload="auto"></audio>

  <!-- Áudio da rádio online. O JS coloca o link do stream quando for tocar. -->
  <audio id="streamAudio" preload="none"></audio>

  <!-- Reprise oficial do YouTube. Fica oculto e é controlado pelo botão Reprise. -->
  <iframe
    id="repriseFrame"
    title="Reprise Experiência Black"
    src="https://www.youtube.com/embed/hylxoxVXkeM?enablejsapi=1&playsinline=1"
    allow="autoplay; encrypted-media"
    style="position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;border:0;"
  ></iframe>

  <!-- Carrega o JavaScript no final para garantir que o HTML já existe. -->
  <script src="js/app.js?v=1.1.6-mobile-clean-fix"></script>

</body>
</html>
